<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Student Grade Calculator</h1>

        <div class="card">

            <label>Student Name</label>
            <input type="text" id="studentName" placeholder="Enter name">

            <label>HTML Marks</label>
            <input type="number" id="htmlMark" min="0" max="100">

            <label>CSS Marks</label>
            <input type="number" id="cssMark" min="0" max="100">

            <label>JavaScript Marks</label>
            <input type="number" id="jsMark" min="0" max="100">

            <button id="calculateBtn">
                Calculate Result
            </button>

            <div id="result"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
